name: Check upstream for updates

on:
  schedule:
    - cron: '0 * * * *'  # hourly; change to e.g. '*/15 * * * *' for every 15 min
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check upstream commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/check-upstream.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/.upstream
          git diff --cached --quiet && echo "No upstream changes." && exit 0
          git commit -m "chore: bump upstream commit tracking"
          git push
