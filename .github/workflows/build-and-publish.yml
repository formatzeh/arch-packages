name: Build and publish Arch repo

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated package directory names; leave empty to build all packages"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - "packages/*/PKGBUILD"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            pacman-contrib \
            sudo

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 440 /etc/sudoers.d/builder

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        env:
          REQUESTED_PACKAGES: ${{ inputs.packages }}
        run: |
          set -eu

          BEFORE="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PKGS="$REQUESTED_PACKAGES"
            if [ -z "$PKGS" ]; then
              BUILD_TARGETS="--all"
            else
              BUILD_TARGETS="$PKGS"
            fi
          elif [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            PKGS=$(git ls-files 'packages/*/PKGBUILD' \
              | cut -d/ -f2 | sort -u | tr '\n' ' ')
            BUILD_TARGETS="$PKGS"
          else
            CHANGED_FILES=$(git diff --diff-filter=AM --name-only \
              "$BEFORE" "${{ github.sha }}" -- 'packages/*/PKGBUILD')
            PKGS=$(printf '%s\n' "$CHANGED_FILES" \
              | cut -d/ -f2 | sort -u | tr '\n' ' ')
            BUILD_TARGETS="$PKGS"
          fi

          if [ -z "$BUILD_TARGETS" ]; then
            echo "No added or modified PKGBUILDs were detected." >&2
            exit 1
          fi

          for pkg in $PKGS; do
            case "$pkg" in
              *[!A-Za-z0-9@._+-]*|'')
                echo "Invalid package directory name: $pkg" >&2
                exit 1
                ;;
            esac
            test -f "packages/$pkg/PKGBUILD"
          done

          echo "Build targets: $BUILD_TARGETS"
          echo "BUILD_TARGETS=$BUILD_TARGETS" >> "$GITHUB_ENV"

      - name: Fix ownership
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Restore package cache
        uses: actions/cache@v4
        with:
          path: repo/x86_64
          key: pkgs-${{ github.sha }}
          restore-keys: |
            pkgs-

      - name: Fix cache ownership
        run: |
          mkdir -p repo/x86_64
          chown -R builder:builder repo/x86_64

      - name: Build repo
        run: |
          cd "$GITHUB_WORKSPACE"
          sudo -u builder REPO_NAME=personal ./scripts/build-repo.sh $BUILD_TARGETS

      - name: Add simple index page
        run: |
          cat > "$GITHUB_WORKSPACE/repo/index.html" <<'EOF'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Personal Arch Repo</title>
          </head>
          <body>
            <h1>Personal Arch Repo</h1>
            <p>Repository path:</p>
            <pre>Server = https://formatzeh.github.io/arch-packages/$arch</pre>
          </body>
          </html>
          EOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: repo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
